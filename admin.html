<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dealer Catalog Admin</title><style>body{font-family:Arial;background:#f4f6f9;margin:0}header{background:#1f2937;color:#fff;padding:16px;text-align:center}main{max-width:1000px;margin:20px auto;padding:20px}.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}input,select,button,textarea{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}button{background:#2563eb;color:#fff;border:0;border-radius:6px}textarea{height:260px}</style></head><body><header><h1>Dealer Catalog Admin</h1></header><main><div class='card'><h2>Импорт dealers.json</h2><input type='file' id='file' accept='.json'></div><div class='card'><h2>Добавить бренд</h2><input id='brand' placeholder='Бренд'><input id='dealer' placeholder='Первый дилер'><button onclick='addBrand()'>Добавить бренд</button></div><div class='card'><h2>Добавить дилера</h2><select id='brands'></select><input id='newDealer' placeholder='Дилер'><button onclick='addDealer()'>Добавить дилера</button></div><div class='card'><h2>Каталог</h2><div id='list'></div></div><div class='card'><button onclick='download()'>Скачать dealers.json</button><textarea id='json'></textarea></div></main><script>let data=[];file.onchange=e=>{let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);refresh()};r.readAsText(e.target.files[0])};function refresh(){json.value=JSON.stringify(data,null,2);brands.innerHTML='';list.innerHTML='';data.forEach((b,i)=>{brands.innerHTML+=`<option value="${i}">${b.brand}</option>`;let d=document.createElement('div');d.innerHTML=`<h3>${b.brand} <button onclick="removeBrand(${i})">Удалить бренд</button></h3><ul>${b.dealers.map((x,j)=>`<li>${x} <button onclick="removeDealer(${i},${j})">Удалить</button></li>`).join('')}</ul>`;list.appendChild(d);});}function addBrand(){if(!brand.value||!dealer.value)return;data.push({brand:brand.value,dealers:[dealer.value]});brand.value='';dealer.value='';refresh()}function addDealer(){if(newDealer.value){data[brands.value].dealers.push(newDealer.value);newDealer.value='';refresh()}}function removeBrand(i){if(confirm('Удалить?')){data.splice(i,1);refresh()}}function removeDealer(i,j){if(confirm('Удалить дилера?')){data[i].dealers.splice(j,1);refresh()}}function download(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='dealers.json';a.click();}</script></body></html>
